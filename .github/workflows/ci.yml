name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Code quality ──────────────────────────────────────────────────
  check:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2

    - run: cargo fmt -- --check
    - run: cargo clippy --all-targets -- -D warnings

  # ── Security: vulnerability audit ─────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: taiki-e/install-action@cargo-audit

    - run: cargo audit --ignore RUSTSEC-2026-0195

  # ── Security: licence + advisory deny ─────────────────────────────
  security-deny:
    name: License/Advisory Deny
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: taiki-e/install-action@cargo-deny

    - run: cargo-deny check advisories

  # ── Test (Linux + macOS) ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - run: cargo build --verbose
    - run: cargo test --verbose

  # ── Windows build ─────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - run: cargo build --release

    - name: Verify binary
      shell: pwsh
      run: |
        if (Test-Path target\release\news-mcp.exe) {
          Write-Host "OK: news-mcp.exe built"
        } else {
          Write-Error "Binary not found"
          exit 1
        }

  # ── Cross-platform build ──────────────────────────────────────────
  build:
    name: ${{ matrix.display }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            display: "Linux x64"
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            display: "Linux ARM64"
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            display: "macOS Intel"
            os: macos-latest
          - target: aarch64-apple-darwin
            display: "macOS ARM (Apple Silicon)"
            os: macos-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - uses: Swatinem/rust-cache@v2

    - name: Install cross
      if: matrix.cross
      uses: taiki-e/install-action@cross

    - name: Build (native)
      if: ${{ !matrix.cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build (cross)
      if: matrix.cross
      run: cross build --release --target ${{ matrix.target }}

  # ── Docs ──────────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - run: cargo doc --no-deps --all-features

  # ── Docker build test (no push) ───────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        cp config.example.toml config.toml
        docker build -f Dockerfile.scratch -t news-mcp:local .
