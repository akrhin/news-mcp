# ═══════════════════════════════════════════════════════════════════════════════
# News MCP Server — Example Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# Copy this file to your config location (e.g. ~/.hermes/news-mcp.toml or
# specify with `--config` on startup). All settings have sensible defaults.
#
# Environment variables override config values at runtime:
#   NEWS_MCP_PORT    — server port
#   NEWS_MCP_HOST    — server host
#   NEWS_MCP_LOG_LEVEL — log level
#   NEWS_MCP_INTERVAL  — poll interval in seconds
#   NEWS_MCP_TRANSPORT — transport mode (stdio/http/sse/hybrid)

# ── Server ───────────────────────────────────────────────────────────────────
[server]
name = "news-mcp"
version = "0.1.0"
host = "127.0.0.1"
port = 8080
transport_mode = "stdio"

# ── Cache ────────────────────────────────────────────────────────────────────
[cache]
max_articles_per_category = 100

# ── Poller ───────────────────────────────────────────────────────────────────
# Background poller refetches all feeds on an interval and keeps the cache warm.
[poller]
enabled = true
interval_secs = 600          # 10 min — good for security feeds

# ── Article Content Fetcher ──────────────────────────────────────────────────
[article_fetch]
fetch_timeout_secs = 10

# ── Logging ──────────────────────────────────────────────────────────────────
[logging]
level = "info"
enable_console = true

# ── Custom Feeds ─────────────────────────────────────────────────────────────
# Define your own RSS/Atom feeds here. Each key becomes a category name
# available via the `get_news` MCP tool.
#
#   [feeds.<name>]
#   display_name = "..."     # Human-readable name (shown to user)
#   description = "..."      # Optional description
#   enabled = true/false     # Show/hide from tool schema
#   urls = ["...", "..."]    # RSS/Atom feed URLs (fetched in parallel)
#
# ── CVE / Security Feeds ────────────────────────────────────────────────────

[feeds.cisa]
display_name = "CISA Alerts"
description = "CISA Known Exploited Vulnerabilities — US Cybersecurity & Infrastructure Security Agency"
enabled = true
urls = ["https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.xml"]

[feeds.ubuntu_security]
display_name = "Ubuntu Security"
description = "Ubuntu security advisories and CVE notifications"
enabled = true
urls = ["https://lists.ubuntu.com/archives/ubuntu-security-announce/feed.xml"]

[feeds.debian_security]
display_name = "Debian Security"
description = "Debian security advisories — DSA notifications"
enabled = true
urls = ["https://lists.debian.org/debian-security-announce/feed.xml"]

[feeds.redhat_security]
display_name = "Red Hat Security"
description = "Red Hat security advisories and CVE notifications"
enabled = true
urls = ["https://access.redhat.com/security/data/certificates/rss.xml"]

[feeds.thehackernews]
display_name = "The Hacker News"
description = "The Hacker News — cybersecurity news and analysis"
enabled = true
urls = ["https://feeds.feedburner.com/TheHackerNews"]

[feeds.opennet]
display_name = "OpenNET Security"
description = "OpenNET — security and Linux news (KOI8-R encoding, auto-detected)"
enabled = true
urls = ["https://www.opennet.ru/opennews/opennews_all.rss"]

[feeds.bleeping_computer]
display_name = "BleepingComputer"
description = "BleepingComputer — technology news, security, and malware analysis"
enabled = true
urls = ["https://www.bleepingcomputer.com/feed/"]

[feeds.nist_nvd]
display_name = "NIST NVD"
description = "National Vulnerability Database — official CVE feed (recent 20 CVEs)"
enabled = true
urls = ["https://nvd.nist.gov/feeds/xml/cve-2.0/known.xml"]

# ── Tech / General News ──────────────────────────────────────────────────────

[feeds.techcrunch]
display_name = "TechCrunch"
description = "TechCrunch — startup and technology news"
enabled = true
urls = ["https://techcrunch.com/feed/"]

[feeds.arstechnica]
display_name = "Ars Technica"
description = "Ars Technica — technology, science, and policy"
enabled = true
urls = ["https://feeds.arstechnica.com/arstechnica/index"]

[feeds.theverge]
display_name = "The Verge"
description = "The Verge — technology, science, art, and culture"
enabled = true
urls = ["https://www.theverge.com/rss/index.xml"]

[feeds.sciencedaily]
display_name = "ScienceDaily"
description = "ScienceDaily — science news"
enabled = true
urls = ["https://www.sciencedaily.com/rss/all.xml"]

[feeds.phoronix]
display_name = "Phoronix"
description = "Phoronix — Linux hardware reviews, benchmark, and open-source news"
enabled = true
urls = ["https://www.phoronix.com/rss.php"]

# ── Disabled Examples ────────────────────────────────────────────────────────
# Set enabled = false to keep a feed in config without exposing it in MCP tools:

[feeds.lwn]
display_name = "LWN (disabled)"
description = "Linux Weekly News — kernel and free software development"
enabled = false
urls = ["https://lwn.net/headlines/newrss"]
